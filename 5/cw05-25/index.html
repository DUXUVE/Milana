<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script type="module" src="script.js"></script>
    <link rel="stylesheet" href="./Carousel/carousel.css" />
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      .test1 {
        background-color: gray;
      }
      .test2 {
        background-color: blue;
      }
      .test3 {
        background-color: red;
      }
      .carousel {
        --width: 800px;
        height: 50vh;
        width: var(--width);
        border-radius: 4px;
        position: relative;
        overflow-x: hidden;
      }
      .carousel-inner {
        position: absolute;
        left: 0;
        top: 0;
        display: flex;
        flex-direction: row;
        justify-content: left;
        flex-wrap: nowrap;
        height: 100%;
        transition: left 0.3s ease-in; 
      }

      .images {
        width: var(--width);
        height: 100%;
        overflow: hidden;
      }

      .images img {
        height: 100%;
        width: 100%;
        object-fit: cover;
        object-position: center;
      }

      .carousel__button {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        z-index: 10;
        background-color: rgba(0, 0, 0, 0.5);
        border-radius: 50%;
        font-size: 36px;
        color: white;
        width: 1.3em;
        height: 1.3em;
        text-align: center;

        border: none;
      }
      .carousel__button.left {
        left: 1rem;
      }
      .carousel__button.right {
        right: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="carousel">
      <div class="carousel-inner">
        <div class="images"><img src="https://i.pinimg.com/736x/8f/ed/5f/8fed5fcd8c1232d53c6fff84d40c8698.jpg" alt=""></div>
        <div class="images"><img src="https://i.pinimg.com/1200x/d2/60/bf/d260bf268c1ee5fb2cfb6ebeec477ec7.jpg" alt=""></div>
        <div class="images"><img src="https://i.pinimg.com/control1/1200x/e6/4f/c1/e64fc17c0f368e3917da5a54641a30bd.jpg" alt=""></div>
      </div>
    </div>
  </body>
</html>
