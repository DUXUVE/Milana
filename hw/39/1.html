<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Визитка</title>
    <style>
        .card {
            border: 2px solid #f593c9;
            border-radius: 15px;
            padding: 25px;
            max-width: 400px;
            margin: 50px auto;
            background-color: #f9f9f9;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .card h2 {
            margin-top: 0;
            color: #333;
        }
        .card p {
            color: #555;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="app"></div>

    <script>
        const name = "Mi";
        const role = "Sssss";
        const description = "Wwwwwwwwww";
        const emoji = "🐷";

        const app = document.getElementById('app');

        const card = document.createElement('div');
        card.className = 'card';

        const h1 = document.createElement('h1');
        h1.textContent = `Привет, ${name}!`;

        const h2 = document.createElement('h2');
        h2.textContent = role;

        const p = document.createElement('p');
        p.textContent = description;

        const quote = document.createElement('div');
        quote.style.fontSize = '40px';
        quote.style.marginTop = '20px';
        quote.textContent = emoji;

        card.appendChild(h1);
        card.appendChild(h2);
        card.appendChild(p);
        card.appendChild(quote);
        app.appendChild(card);
    </script>

</body>
</html>
