<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Решение заданий</title>
</head>
<body>

<script>
// 1
function User(name) {
    this.name = name;
}
User.prototype.sayHello = function() {
    console.log(`привет, меня зовут ${this.name}`);
};
const user1 = new User('максим');
user1.sayHello();

// 2
function Product(price, quantity) {
    this.price = price;
    this.quantity = quantity;
}
Product.prototype.calculateTotal = function() {
    return this.price * this.quantity;
};
const product = new Product(150, 4);
console.log('общая стоимость товара:', product.calculateTotal());

// 3
function Account(owner, balance) {
    this.owner = owner;
    this.balance = balance;
}
Account.prototype.deposit = function(amount) {
    this.balance += amount;
    console.log(`счет пополнен на ${amount}. текущий баланс: ${this.balance}`);
};
Account.prototype.withdraw = function(amount) {
    if (amount <= this.balance) {
        this.balance -= amount;
        console.log(`снято ${amount}. остаток: ${this.balance}`);
    } else {
        console.log(`недостаточно средств. доступно: ${this.balance}`);
    }
};
const myAccount = new Account('мария', 1000);
myAccount.deposit(500);
myAccount.withdraw(2000);
</script>

</body>
</html>
