<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer scr="2.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .traffic-lights {
            background-color: black;
            padding: 50px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .light {
            background-color: #444;
            height: 100px;
            width: 100px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <main class="container">
        <div class="traffic-lights">
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
        </div>
    </main>
</body>
</html>
